services:
  - type: web
    name: vibemall
    rootDir: VibeMall
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn FashioHub.wsgi:application"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vibemall-db
          property: connectionString

databases:
  - name: vibemall-db
    databaseName: vibemall
    user: vibemall
    plan: free
